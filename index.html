<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat Fact UI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .main {
      background: #1e293b;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #1e293b;
      background: #020617;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      resize: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #020617;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #output {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #020617;
      border: 1px solid #14b8a6;
      min-height: 70px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="main">
      <h2>🐱 Cat Fact Generator</h2>

      <!-- textarea optional (just for UI feel) -->
      <textarea id="prompt" placeholder="Click button to get cat fact..."></textarea>

      <button onclick="generate()">Get Cat Fact</button>

      <div id="output">Result will appear here...</div>
    </div>
  </div>

  <script>
    async function generate() {
      const output = document.getElementById("output");

      output.innerText = "Fetching cat fact... ⏳";

      try {
        const response = await fetch("https://catfact.ninja/fact");
        const data = await response.json();

        output.innerText = data.fact;

      } catch (error) {
        console.error(error);
        output.innerText = "Error fetching cat fact!";
      }
    }
  </script>
</body>
</html>
