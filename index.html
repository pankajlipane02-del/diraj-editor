<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API UI</title>
  

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .main {
      background: #1e293b;
      padding: 25px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    textarea {
      width: 100%;
      height: 130px;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #1e293b;
      background: #020617;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      resize: none;
      transition: 0.3s;
    }

    textarea:focus {
      border-color: #14b8a6;
      box-shadow: 0 0 8px #14b8a6;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #14b8a6, #0d9488);
      color: #020617;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(20,184,166,0.4);
    }

    #output {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #020617;
      border: 1px solid #14b8a6;
      min-height: 70px;
      font-size: 14px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="main">
      <div style="text-align: center;">
        <img src="./pngwing.com (1).png" width="60px" alt="">
      </div>

      <textarea id="prompt" placeholder="Ask anything..."></textarea>
      <button onclick="generate()">Generate</button>

      <div id="output">Result will appear here...</div>
    </div>
  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const output = document.getElementById("output");

      if (!prompt.trim()) {
        output.innerText = "Please enter something!";
        return;
      }

      output.innerText = "Generating... ⏳";

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer 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",
            "Content-Type": "application/json",
            "HTTP-Referer": "http://localhost", // optional
            "X-OpenRouter-Title": "My API UI"
          },
          body: JSON.stringify({
            model: "openai/gpt-5.4-mini",
            messages: [
              {
                role: "user",
                content: prompt
              }
            ]
          })
        });

        const data = await response.json();

        if (data.choices && data.choices.length > 0) {
          output.innerText = data.choices[0].message.content;
        } else {
          output.innerText = "No response received.";
        }

      } catch (error) {
        console.error(error);
        output.innerText = "Error occurred! Check console.";
      }
    }
  </script>
</body>
</html>
